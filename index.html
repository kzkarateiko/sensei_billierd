<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SENSEI Kolhoz PRO</title>

<style>

body{
font-family:Arial;
background:#071b13;
color:white;
margin:0;
padding:20px;
text-align:center;
}

.logo{
width:180px;
margin-bottom:10px;
}

.club{
font-size:14px;
margin-top:20px;
opacity:0.9;
}

.card{
background:#123524;
padding:25px;
border-radius:12px;
max-width:750px;
margin:auto;
}

h2{
margin-top:5px;
}

.row{
display:flex;
gap:10px;
margin-bottom:10px;
}

.name{flex:2}
.score{flex:1}

input{
width:100%;
padding:12px;
border-radius:8px;
border:none;
font-size:16px;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:10px;
font-size:18px;
font-weight:bold;
margin-top:10px;
cursor:pointer;
}

.calc{background:#d4af37;color:black}
.copy{background:#35607c;color:white}
.reset{background:#7a1f1f;color:white}

.result{
background:#08140d;
padding:12px;
border-radius:8px;
margin-top:10px;
text-align:left;
}

.green{color:#4cff7c}
.red{color:#ff6b6b}

.explain{
font-size:14px;
opacity:0.9;
margin-top:6px;
}

.map{
margin-top:15px;
background:#d4af37;
color:black;
font-weight:bold;
}

</style>
</head>

<body>

<div class="card">

<img src="WhatsApp Image 2026-03-09 at 21.48.12.jpeg" class="logo">

<h2>SENSEI KOLHOZ CALCULATOR</h2>

<div class="row">
<div style="flex:2">Ставка за шар</div>
<input id="stake" type="number" value="1000">
</div>

<div class="row">
<div class="name">Игрок</div>
<div class="score">П1</div>
<div class="score">П2</div>
</div>

<div id="players"></div>

<button class="calc" onclick="calc()">ПОДСЧИТАТЬ</button>
<button class="copy" onclick="copyResult()">СКОПИРОВАТЬ В WHATSAPP</button>
<button class="reset" onclick="resetAll()">СБРОС</button>

<div id="results"></div>

<div class="club">

<b>SENSEI BILLIARD CLUB</b><br><br>

📍 Каражанова улица, 1а<br>
Алматинская область, Каскелен<br>

</div>

<button class="map" onclick="openMap()">
ОТКРЫТЬ АДРЕС В КАРТЕ
</button>

</div>

<script>

let container=document.getElementById("players")

for(let i=0;i<4;i++){

container.innerHTML+=`

<div class="row">

<input class="name" id="name${i}" placeholder="Игрок">

<input class="score" id="p1_${i}" type="number">

<input class="score" id="p2_${i}" type="number">

</div>

`

}

function calc(){

let stake=parseInt(document.getElementById("stake").value)||0

let players=[]

for(let i=0;i<4;i++){

let name=document.getElementById("name"+i).value

if(name!=""){

let p1=parseInt(document.getElementById("p1_"+i).value)||0
let p2=parseInt(document.getElementById("p2_"+i).value)||0

players.push({
name:name,
score:p1+p2,
money:0
})

}

}

let explain=[]

for(let i=0;i<players.length;i++){

for(let j=i+1;j<players.length;j++){

let diff=players[i].score-players[j].score
let money=Math.abs(diff)*stake

if(diff>0){

players[i].money+=money
players[j].money-=money

explain.push(
players[j].name+" проиграл "+players[i].name+
" "+money+"₸ ("+Math.abs(diff)+" шаров)"
)

}

if(diff<0){

players[i].money-=money
players[j].money+=money

explain.push(
players[i].name+" проиграл "+players[j].name+
" "+money+"₸ ("+Math.abs(diff)+" шаров)"
)

}

}

}

let html="<div class='result'><b>ИТОГ ИГРЫ</b><br><br>"

players.forEach(p=>{

if(p.money>0){

html+=`<div class="green">${p.name} +${p.money}₸</div>`

}else if(p.money<0){

html+=`<div class="red">${p.name} ${p.money}₸</div>`

}else{

html+=`${p.name} 0₸`

}

})

html+="<br><b>КТО КОМУ ДОЛЖЕН</b><br>"

explain.forEach(e=>{

html+=`<div class="explain">${e}</div>`

})

html+="</div>"

document.getElementById("results").innerHTML=html

}

function copyResult(){

let text=document.getElementById("results").innerText

navigator.clipboard.writeText(text)

alert("Результат скопирован. Вставь в WhatsApp.")

}

function resetAll(){

location.reload()

}

function openMap(){

window.open("https://maps.google.com/?q=Каражанова+1а+Каскелен")

}

</script>

</body>

</html>
